<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>QOff — Bars favoris</title>
<link rel="stylesheet" href="styles.css">
</head>
<body>
<div class="screen">
  <nav class="topbar sub-topbar">
    <button class="topbar-icon" onclick="history.back()" id="btn-back"></button>
    <span class="sub-topbar-title">Bars favoris</span>
    <span style="width:44px"></span>
  </nav>

  <div class="subpage">
    <!-- Carte récap sombre -->
    <div class="fav-hero">
      <div class="fav-hero-ttl">Vos bars favoris</div>
      <div class="fav-hero-sub">Retrouvez-les en un geste et commandez plus vite.</div>
      <div class="fav-hero-row">
        <div><div class="fav-stat-n" id="fav-count">3</div><div class="fav-stat-l">favoris</div></div>
        <div><div class="fav-stat-n">1</div><div class="fav-stat-l">Happy Hour actif</div></div>
        <div><div class="fav-stat-n">120 m</div><div class="fav-stat-l">le plus proche</div></div>
      </div>
    </div>

    <div class="fav-sec-ttl">À proximité</div>
    <div class="fav-list" id="fav-list"></div>
  </div>
</div>

<script src="data.js"></script>
<script src="icons.js"></script>
<script>
  document.getElementById('btn-back').innerHTML = IC.back;

  const list = document.getElementById('fav-list');
  BARS.forEach(bar => {
    const a = document.createElement('a');
    a.href = `bar-detail.html?bar=${bar.id}`;
    a.className = 'bar-card';
    a.onclick = () => setSelectedBar(bar.id);
    a.innerHTML = `
      <div class="bar-card-emoji">${bar.emoji}</div>
      <div class="bar-card-body">
        <div class="bar-card-name">${bar.name}</div>
        <div class="bar-card-meta">
          <span class="badge badge-open"><span class="dot"></span>Ouvert</span>
          ${bar.happyHour ? '<span class="sep">•</span><span style="color:var(--orange);font-weight:600">Happy Hour</span>' : ''}
        </div>
      </div>
      <div class="bar-card-dist">${IC.walk}&nbsp;${bar.distance}</div>`;
    list.appendChild(a);
  });
</script>
</body>
</html>
