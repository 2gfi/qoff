<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>QOff — Moyens de paiement</title>
<link rel="stylesheet" href="styles.css">
</head>
<body>
<div class="screen">
  <nav class="topbar sub-topbar">
    <button class="topbar-icon" onclick="history.back()" id="btn-back"></button>
    <span class="sub-topbar-title">Moyens de paiement</span>
    <span style="width:44px"></span>
  </nav>

  <div class="subpage">
    <p class="subpage-lead">Vos moyens de paiement enregistrés. Le moyen par défaut est utilisé pour valider vos commandes en un geste.</p>
    <div class="pm-list" id="pm-list"></div>
  </div>
</div>

<script src="data.js"></script>
<script src="icons.js"></script>
<script>
  document.getElementById('btn-back').innerHTML = IC.back;

  const GLYPHS = {
    twint: '<span style="color:#fff;font-weight:800;font-size:13px">T</span>',
    visa:  '<span style="color:#fff;font-size:11px;font-weight:800;letter-spacing:0.02em">VISA</span>',
    mc:    '',
    apple: IC.card,
  };

  const list = document.getElementById('pm-list');
  SAVED_METHODS.forEach(m => {
    const btn = document.createElement('button');
    btn.className = 'pmcard';
    btn.innerHTML = `
      <span class="pm-brand ${m.brand}">${GLYPHS[m.brand]||''}</span>
      <span class="pm-body">
        <span class="pm-name">${m.name}</span>
        <span class="pm-meta">${m.meta}</span>
      </span>
      ${m.isDefault ? '<span class="pm-default">Par défaut</span>' : IC.chevR}`;
    list.appendChild(btn);
  });

  const addBtn = document.createElement('button');
  addBtn.className = 'pmcard add';
  addBtn.innerHTML = `${IC.plus} Ajouter un moyen de paiement`;
  list.appendChild(addBtn);
</script>
</body>
</html>
