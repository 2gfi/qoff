<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>QOff — Facture</title>
<link rel="stylesheet" href="styles.css">
</head>
<body>
<div class="screen">
  <div class="pdf-topbar">
    <span class="pdf-title">Facture</span>
    <a class="topbar-icon" href="confirmation.html" aria-label="Fermer">
      <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.75" stroke-linecap="round" stroke-linejoin="round"><path d="M18 6 6 18M6 6l12 12"/></svg>
    </a>
  </div>

  <div class="pdf-content">
    <div class="pdf-doc" id="pdf-doc"></div>
  </div>

  <div class="sticky-cta" style="background:var(--surface)">
    <button class="btn-primary" onclick="alert('Téléchargement simulé — en production un vrai PDF serait généré.')">Télécharger le PDF</button>
  </div>
</div>

<script src="data.js"></script>
<script src="icons.js"></script>
<script>
  const cart = getCart();
  let items = [];
  MENU.categories.forEach(c => c.items.forEach(it => {
    const q = cart[it.id]; if (q) items.push({...it, qty:q});
  }));
  if (!items.length) items = SAMPLE_CART.map(i => ({...ITEMS[i.id],...i}));

  const total = items.reduce((a,i) => a + i.qty*(i.hhPrice!=null?i.hhPrice:i.price), 0);
  const bar   = BARS.find(b => b.id === getSelectedBar()) || BARS[0];
  const today = new Date().toLocaleDateString('fr-CH');

  const rows = items.map(i => {
    const p = i.hhPrice!=null?i.hhPrice:i.price;
    return `<tr><td>${i.name}</td><td class="r t-mono">${i.qty}</td><td class="r t-mono">${formatPrice(i.qty*p)}</td></tr>`;
  }).join('');

  document.getElementById('pdf-doc').innerHTML = `
    <div class="pdf-logo">Q<em>O</em>ff</div>
    <div class="pdf-meta">
      <div><strong>${bar.name}</strong><br>${bar.address}<br>1003 Lausanne</div>
      <div class="pdf-meta-r">
        <div>Facture N° <span class="t-mono">2026-0427</span></div>
        <div>${today}</div>
        <div>Camille Roux</div>
      </div>
    </div>
    <table class="pdf-table">
      <thead><tr><th>Article</th><th class="r">Qté</th><th class="r">Prix</th></tr></thead>
      <tbody>
        ${rows}
        <tr class="pdf-total"><td>Total (TVA 8.1% incl.)</td><td></td><td class="r t-mono">${formatPrice(total)}</td></tr>
      </tbody>
    </table>
    <div class="pdf-footer">Merci de votre visite · QOff pour ${bar.name} · TVA CHE-123.456.789</div>`;
</script>
</body>
</html>
