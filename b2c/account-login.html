<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>QOff — Connexion</title>
<link rel="stylesheet" href="styles.css">
</head>
<body>
<div class="screen">
  <nav class="topbar sub-topbar">
    <button class="topbar-icon" onclick="history.back()" id="btn-back"></button>
    <span class="sub-topbar-title">Mon compte</span>
    <span style="width:44px"></span>
  </nav>

  <div class="scroll-area" style="padding:24px 18px">
    <div class="acct-avatar" style="margin-bottom:14px">
      <svg width="30" height="30" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="8" r="4"/><path d="M4 20c0-4 3.6-7 8-7s8 3 8 7"/></svg>
    </div>
    <h1 class="sttl" style="text-align:center">Connexion</h1>
    <p class="ssub" style="text-align:center">Suivez vos commandes et recommandez en un geste.</p>

    <div class="phone-wrap" style="margin-top:22px">
      <button class="phone-country" id="btn-country">
        <span class="cflag">🇨🇭</span>
        <span class="t-mono">+41</span>
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"><path d="M9 6l6 6-6 6"/></svg>
      </button>
      <input class="phone-num t-mono" type="tel" value="79 412 88 30" placeholder="79 000 00 00">
    </div>
    <label class="crow">
      <input type="checkbox" checked style="accent-color:var(--orange)">
      <span>Mémoriser mon numéro</span>
    </label>
    <button class="btn-primary" style="margin-top:16px" onclick="window.location='login-otp.html'">Recevoir le code SMS</button>

    <p class="legal-note" style="margin-top:18px">En continuant, vous acceptez de recevoir un SMS de vérification. Conditions &amp; confidentialité.</p>
  </div>
</div>

<script src="data.js"></script>
<script src="icons.js"></script>
<script>
  document.getElementById('btn-back').innerHTML = IC.back;
</script>
</body>
</html>
