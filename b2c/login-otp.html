<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>QOff — Code OTP</title>
<link rel="stylesheet" href="styles.css">
</head>
<body>
<div class="screen">
  <nav class="topbar sub-topbar">
    <button class="topbar-icon" onclick="history.back()" id="btn-back"></button>
    <span style="width:44px"></span>
    <span style="width:44px"></span>
  </nav>

  <div class="scroll-area" style="padding:8px 18px 18px">
    <h1 class="sttl">Code de<br>vérification</h1>
    <p class="ssub">Code envoyé au <span class="t-mono">+41 79 412 88 30</span></p>

    <div class="otp-wrap" id="otp-wrap">
      <div class="otp-inp" id="otp-0"></div>
      <div class="otp-inp" id="otp-1"></div>
      <div class="otp-inp" id="otp-2"></div>
      <div class="otp-inp" id="otp-3"></div>
    </div>

    <!-- Input réel caché -->
    <input type="tel" id="otp-real" maxlength="4" inputmode="numeric" pattern="[0-9]*"
      style="position:absolute;opacity:0;pointer-events:none;width:1px;height:1px">

    <div class="otp-hint">Code de démonstration : <strong class="t-mono">4827</strong></div>
    <button class="otp-resend" id="resend-btn" style="background:none;border:none;cursor:pointer;padding:0;display:block;margin-top:14px;width:100%;text-align:center">Renvoyer le code (0:24)</button>
  </div>

  <div class="sticky-cta">
    <button class="btn-primary" id="btn-confirm" onclick="confirm()">Confirmer</button>
  </div>
</div>

<script src="data.js"></script>
<script src="icons.js"></script>
<script>
  document.getElementById('btn-back').innerHTML = IC.back;

  const realInput = document.getElementById('otp-real');
  let digits = ['','','',''];

  function renderOtp() {
    for (let i = 0; i < 4; i++) {
      const box = document.getElementById(`otp-${i}`);
      const filled = digits[i] !== '';
      const focusIdx = digits.filter(d => d!=='').length;
      const isFocus  = i === focusIdx && focusIdx < 4;
      box.className = `otp-inp${filled?' filled':''}${isFocus?' focus':''}`;
      if (filled) {
        box.textContent = digits[i];
      } else if (isFocus) {
        box.innerHTML = '<span class="otp-caret"></span>';
      } else {
        box.textContent = '';
      }
    }
  }

  // Tap sur n'importe quelle case → focus l'input réel
  document.getElementById('otp-wrap').addEventListener('click', () => realInput.focus());
  realInput.focus();

  realInput.addEventListener('input', () => {
    const val = realInput.value.replace(/\D/g,'').slice(0,4);
    digits = val.split('').concat(['','','','']).slice(0,4);
    renderOtp();
    if (val.length === 4) setTimeout(confirm, 300);
  });

  function confirm() {
    // Simuler connexion
    setConnected(true);
    // Retourner selon le contexte : si on vient du paiement → payment, sinon
    const ref = document.referrer;
    if (ref.includes('account')) {
      window.location.href = 'account-connected.html';
    } else {
      window.location.href = 'payment.html';
    }
  }

  // Compte à rebours renvoyer
  let secs = 24;
  const resendBtn = document.getElementById('resend-btn');
  const timer = setInterval(() => {
    secs--;
    if (secs <= 0) {
      clearInterval(timer);
      resendBtn.textContent = 'Renvoyer le code';
      resendBtn.style.color = 'var(--orange)';
    } else {
      const m = Math.floor(secs/60), s = secs%60;
      resendBtn.textContent = `Renvoyer le code (${m}:${s.toString().padStart(2,'0')})`;
    }
  }, 1000);

  renderOtp();
</script>
</body>
</html>
