<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>QOff — Nous écrire</title>
<link rel="stylesheet" href="styles.css">
</head>
<body>
<div class="screen">
  <nav class="topbar sub-topbar">
    <button class="topbar-icon" onclick="history.back()" id="btn-back"></button>
    <span class="sub-topbar-title">Nous écrire</span>
    <span style="width:44px"></span>
  </nav>

  <div class="subpage">
    <p class="subpage-lead">Décrivez votre demande, notre équipe vous répond par e-mail sous 24 h ouvrées.</p>

    <div class="cform-field">
      <label class="cform-lbl">Sujet</label>
      <select class="cform-select">
        <option value="commande">Problème avec une commande</option>
        <option value="paiement">Paiement et facturation</option>
        <option value="compte">Mon compte</option>
        <option value="bar">Suggérer un bar</option>
        <option value="autre">Autre</option>
      </select>
    </div>

    <div class="cform-field">
      <label class="cform-lbl">E-mail</label>
      <input class="cform-input" type="email" value="camille.roux@email.ch" placeholder="votre@email.ch">
    </div>

    <div class="cform-field">
      <label class="cform-lbl">Message</label>
      <textarea class="cform-area" placeholder="Expliquez-nous votre demande en quelques lignes…"></textarea>
      <p class="cform-hint">N'indiquez pas de données sensibles (mot de passe, numéro de carte complet).</p>
    </div>

    <a href="contact-confirm.html" class="btn-primary" style="margin-top:4px;display:inline-flex">Envoyer le message</a>

    <div style="height:24px"></div>
  </div>
</div>

<script src="data.js"></script>
<script src="icons.js"></script>
<script>
  document.getElementById('btn-back').innerHTML = IC.back;
</script>
</body>
</html>
