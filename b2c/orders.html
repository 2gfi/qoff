<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>QOff — Mes commandes</title>
<link rel="stylesheet" href="styles.css">
</head>
<body>
<div class="screen">
  <nav class="topbar sub-topbar">
    <button class="topbar-icon" onclick="history.back()" id="btn-back"></button>
    <span class="logo center-logo">Q<em>O</em>ff</span>
    <span style="width:44px"></span>
  </nav>

  <div class="scroll-area" style="padding:16px 18px">
    <h1 class="sttl" style="margin-bottom:16px">Mes commandes</h1>
    <div class="hist-list" id="hist-list"></div>
    <div style="height:24px"></div>
  </div>
</div>

<script src="data.js"></script>
<script src="icons.js"></script>
<script>
  document.getElementById('btn-back').innerHTML = IC.back;

  const BADGE = {
    prep:  { cls:'bp', label:'En cours' },
    ready: { cls:'br', label:'Prête' },
    done:  { cls:'bd', label:'Récupérée' },
  };

  const list = document.getElementById('hist-list');
  ORDERS.forEach(o => {
    const b = BADGE[o.status];
    const div = document.createElement('div');
    div.className = 'hi';
    div.innerHTML = `
      <div class="hi-top">
        <div class="hi-bar-block">
          <span class="hi-emoji">${o.emoji}</span>
          <div>
            <div class="hi-bar">${o.bar}</div>
            <div class="hi-date">${o.date}</div>
          </div>
        </div>
        <span class="bdg ${b.cls}">${b.label}</span>
      </div>
      <div class="hi-bot">
        <span class="hi-prev">${o.preview}</span>
        <span class="hi-amt t-mono">${formatPrice(o.total)}</span>
      </div>`;
    div.addEventListener('click', () => { window.location.href = 'confirmation.html'; });
    list.appendChild(div);
  });
</script>
</body>
</html>
