<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>QOff — Paiement</title>
<link rel="stylesheet" href="styles.css">
</head>
<body>
<div class="screen">
  <nav class="topbar sub-topbar">
    <button class="topbar-icon" onclick="history.back()" id="btn-back"></button>
    <span class="sub-topbar-title">Paiement</span>
    <span style="width:44px"></span>
  </nav>

  <div class="scroll-area" style="padding:14px 18px 18px" id="main">
  </div>
</div>

<script src="data.js"></script>
<script src="icons.js"></script>
<script>
  document.getElementById('btn-back').innerHTML = IC.back;

  const cart  = getCart();
  let items = [];
  MENU.categories.forEach(c => c.items.forEach(it => {
    const q = cart[it.id];
    if (q) items.push({...it, qty:q});
  }));
  if (items.length === 0) { items = SAMPLE_CART.map(i=>({...ITEMS[i.id],...i})); }

  const total = items.reduce((a,i) => {
    const p = i.hhPrice!=null ? i.hhPrice : i.price;
    return a + i.qty * p;
  }, 0);

  const MODES = [
    { id:'card',   label:'Carte',    ic:`${IC.card}` },
    { id:'twint',  label:'Twint',    ic:`<span class="pay-glyph twint">T</span>` },
    { id:'apple',  label:'Apple Pay',ic:`<span class="pay-glyph apple" style="font-size:13px">&#xf8ff;</span>` },
    { id:'google', label:'G Pay',    ic:`<span class="pay-glyph google" style="font-weight:800;color:#4285F4">G</span>` },
    { id:'cash',   label:'Cash',     ic:`${IC.cash}` },
  ];

  let mode = 'twint';

  function renderPanel() {
    if (mode === 'card') return `
      <div class="cfields">
        <div class="fg"><label class="flbl">Numéro de carte</label><div class="finp t-mono">4242 4242 4242 4242</div></div>
        <div class="crow2">
          <div class="fg" style="flex:1;margin-bottom:0"><label class="flbl">Expiration</label><div class="finp t-mono">12 / 28</div></div>
          <div class="fg" style="flex:1;margin-bottom:0"><label class="flbl">CVV</label><div class="finp t-mono">•••</div></div>
        </div>
      </div>`;
    if (mode === 'twint') return `
      <div class="pf pf-twint">
        <span class="pay-glyph twint big">T</span>
        <div class="pf-txt">Twint — paiement simulé</div>
        <div class="pf-sub">Vous validerez dans l'app Twint.</div>
      </div>`;
    if (mode === 'apple') return `
      <div class="pf pf-apple">
        <span class="pay-glyph apple big" style="font-size:22px;color:#fff">&#xf8ff;</span>
        <div class="pf-txt">Apple Pay</div>
        <div class="pf-sub">Confirmez avec Face ID ou Touch ID.</div>
      </div>`;
    if (mode === 'google') return `
      <div class="pf pf-google">
        <span class="pay-glyph google big" style="font-size:22px;font-weight:800;color:#4285F4">G</span>
        <div class="pf-txt">Google Pay</div>
        <div class="pf-sub">Vous serez redirigé pour confirmer.</div>
      </div>`;
    if (mode === 'cash') return `
      <div class="pf pf-cash">
        <span class="pf-warn">⚠</span>
        <div>
          <div class="pf-txt">Paiement en espèces au bar</div>
          <div class="pf-sub">Réglez directement au comptoir en récupérant votre commande.</div>
        </div>
      </div>`;
    return '';
  }

  function render() {
    const methodsHtml = MODES.map(m => `
      <button class="pm${mode===m.id?' on':''}" data-mode="${m.id}">
        <span class="pm-ic">${m.ic}</span>
        <span class="pm-lbl">${m.label}</span>
      </button>`).join('');

    document.getElementById('main').innerHTML = `
      <div class="pay-card">
        <div class="pay-lbl">Montant à payer</div>
        <div class="pay-amt t-mono">${formatPrice(total)}</div>
        <div class="pay-card-sub">${items.reduce((a,i)=>a+i.qty,0)} articles · ${BARS.find(b=>b.id===getSelectedBar())?.name||'Le Jetée'}</div>
      </div>

      <div class="flbl" style="margin-bottom:10px">Mode de paiement</div>
      <div class="pay-methods">${methodsHtml}</div>

      ${renderPanel()}

      <button class="btn-primary" style="margin-top:16px" onclick="payer()">
        Payer · <span class="t-mono">${formatPrice(total)}</span>
      </button>
      <div class="pay-secure">🔒 Paiement sécurisé · Wallee PSP</div>
      <div style="height:24px"></div>`;

    document.querySelectorAll('[data-mode]').forEach(btn => {
      btn.addEventListener('click', () => { mode = btn.dataset.mode; render(); });
    });
  }

  function payer() {
    window.location.href = 'confirmation.html';
  }

  render();
</script>
</body>
</html>
