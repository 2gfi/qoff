<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>QOff — Aide et contact</title>
<link rel="stylesheet" href="styles.css">
</head>
<body>
<div class="screen">
  <nav class="topbar sub-topbar">
    <button class="topbar-icon" onclick="history.back()" id="btn-back"></button>
    <span class="sub-topbar-title">Aide et contact</span>
    <span style="width:44px"></span>
  </nav>

  <div class="subpage">
    <p class="subpage-lead">Une question ? Consultez les réponses fréquentes ci-dessous, ou écrivez-nous directement.</p>

    <div class="faq-list" id="faq-list"></div>

    <a href="contact-form.html" class="help-contact-card">
      <span class="help-cc-ic" id="ic-mail"></span>
      <span class="help-cc-body">
        <span class="help-cc-ttl">Nous écrire</span>
        <span class="help-cc-sub">Réponse sous 24 h ouvrées</span>
      </span>
      <span id="ic-chevr"></span>
    </a>
  </div>
</div>

<script src="data.js"></script>
<script src="icons.js"></script>
<script>
  document.getElementById('btn-back').innerHTML = IC.back;
  document.getElementById('ic-mail').innerHTML  = IC.mail;
  document.getElementById('ic-chevr').innerHTML = IC.chevR;

  let openIdx = 0;
  const faqList = document.getElementById('faq-list');

  function render() {
    faqList.innerHTML = '';
    FAQ.forEach((f, i) => {
      const item = document.createElement('div');
      item.className = `faq-item${openIdx === i ? ' open' : ''}`;
      item.innerHTML = `
        <button class="faq-q">
          ${f.q}
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"><path d="M6 9l6 6 6-6"/></svg>
        </button>
        <div class="faq-a"><div class="faq-a-inner">${f.a}</div></div>`;
      item.querySelector('.faq-q').addEventListener('click', () => {
        openIdx = openIdx === i ? -1 : i;
        render();
      });
      faqList.appendChild(item);
    });
  }

  render();
</script>
</body>
</html>
