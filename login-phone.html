<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>QOff — Connexion</title>
<link rel="stylesheet" href="styles.css">
</head>
<body>
<div class="screen">
  <nav class="topbar sub-topbar">
    <button class="topbar-icon" onclick="history.back()" id="btn-back"></button>
    <span style="width:44px"></span>
    <span style="width:44px"></span>
  </nav>

  <div class="scroll-area" style="padding:8px 18px 18px">
    <h1 class="sttl">Votre numéro<br>de téléphone</h1>
    <p class="ssub">Pour recevoir votre code de vérification par SMS.</p>

    <div class="phone-wrap">
      <button class="phone-country" id="btn-country">
        <span class="cflag">🇨🇭</span>
        <span class="t-mono" id="dial-val">+41</span>
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"><path d="M9 6l6 6-6 6"/></svg>
      </button>
      <input class="phone-num t-mono" id="phone-input" type="tel" value="79 412 88 30" placeholder="79 000 00 00">
    </div>

    <label class="crow">
      <input type="checkbox" id="remember-cb" checked>
      <span>Mémoriser mon numéro pour mes prochaines commandes</span>
    </label>

    <p class="legal-note">En continuant, vous acceptez de recevoir un SMS de vérification. <span style="color:var(--ink-2)">Conditions &amp; confidentialité.</span></p>
  </div>

  <div class="sticky-cta">
    <button class="btn-primary" onclick="goOtp()">Recevoir le code SMS</button>
  </div>

  <!-- Country picker -->
  <div class="sheet-overlay" id="country-sheet" style="display:none" onclick="closeCountry()">
    <div class="sheet" onclick="event.stopPropagation()" style="padding-bottom:40px">
      <div class="handle"></div>
      <h3>Choisir le pays</h3>
      <input class="country-search" id="country-search" placeholder="Rechercher un pays…">
      <div class="country-picker" id="country-picker"></div>
    </div>
  </div>
</div>

<script src="data.js"></script>
<script src="icons.js"></script>
<script>
  document.getElementById('btn-back').innerHTML = IC.back;

  let selectedCountry = COUNTRIES[0];

  function renderCountryPicker() {
    const q = document.getElementById('country-search').value.toLowerCase();
    const list = COUNTRIES.filter(c => c.name.toLowerCase().includes(q) || c.dial.includes(q));
    document.getElementById('country-picker').innerHTML = list.map(c => `
      <button class="country-item${c.code===selectedCountry.code?' on':''}" onclick="selectCountry('${c.code}')">
        <span class="country-flag">${c.flag}</span>
        <span class="country-name">${c.name}</span>
        <span class="country-dial t-mono">${c.dial}</span>
      </button>`).join('');
  }

  function selectCountry(code) {
    selectedCountry = COUNTRIES.find(c => c.code === code);
    document.querySelector('.cflag').textContent   = selectedCountry.flag;
    document.getElementById('dial-val').textContent = selectedCountry.dial;
    closeCountry();
  }

  function closeCountry() {
    document.getElementById('country-sheet').style.display = 'none';
  }

  document.getElementById('btn-country').addEventListener('click', () => {
    document.getElementById('country-search').value = '';
    renderCountryPicker();
    document.getElementById('country-sheet').style.display = 'flex';
  });

  document.getElementById('country-search').addEventListener('input', renderCountryPicker);

  function goOtp() {
    window.location.href = 'login-otp.html';
  }
</script>
</body>
</html>
