<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>QOff — Recommander</title>
<link rel="stylesheet" href="styles.css">
</head>
<body>
<div class="screen">
  <nav class="topbar sub-topbar">
    <button class="topbar-icon" onclick="history.back()" id="btn-back"></button>
    <span class="logo center-logo">Q<em>O</em>ff</span>
    <span style="width:44px"></span>
  </nav>

  <div class="scroll-area" id="main"></div>

  <div class="sticky-cta" id="cta"></div>
</div>

<script src="data.js"></script>
<script src="icons.js"></script>
<script>
  document.getElementById('btn-back').innerHTML = IC.back;
  const barId = getSelectedBar();

  // Init qtys from last order (épuisés exclus)
  const qtys = {};
  LAST_ORDER.forEach(i => { if (!i.soldOut) qtys[i.id] = i.usual; });

  function total() {
    return LAST_ORDER.reduce((a, i) => a + (qtys[i.id]||0) * i.price, 0);
  }

  function render() {
    const rowsHtml = LAST_ORDER.map(i => {
      const q = qtys[i.id] || 0;
      let actHtml;
      if (i.soldOut) {
        actHtml = '<span class="sold-tag">Épuisé</span>';
      } else {
        actHtml = `<div class="qctrl">
          <button class="qbtn mi" data-act="minus" data-id="${i.id}">${IC.minus}</button>
          <span class="qnum t-mono">${q}</span>
          <button class="qbtn pl"  data-act="plus"  data-id="${i.id}">${IC.plus}</button>
        </div>`;
      }
      return `
        <div class="rec-item${i.soldOut?' rec-out':''}">
          <span class="rec-emoji">${i.emoji}</span>
          <div class="rec-info">
            <div class="rec-name">${i.name}</div>
            <div class="rec-detail">
              ${i.soldOut ? "Indisponible aujourd'hui" : `Habituel&nbsp;: ${i.usual} · <span class="t-mono">${formatPrice(i.price)}</span>${i.hh?' <span class="price-tag sm">HH</span>':''}`}
            </div>
          </div>
          ${actHtml}
        </div>`;
    }).join('');

    document.getElementById('main').innerHTML = `
      <div style="padding:20px 18px">
        <h1 class="sttl">Comme d'habitude&nbsp;?</h1>
        <p class="ssub">Retrouvez votre dernière commande au Jetée. Ajustez les quantités avant de commander.</p>
        <div class="rec-list">${rowsHtml}</div>
      </div>`;

    document.getElementById('cta').innerHTML = `
      <div class="rec-actions">
        <button class="btn-primary" onclick="commander()">Commander · <span class="t-mono">${formatPrice(total())}</span></button>
        <a href="menu.html?bar=${barId}" class="btn-ghost">Choisir d'autres conso</a>
      </div>`;

    // Steppers
    document.querySelectorAll('[data-act]').forEach(btn => {
      btn.addEventListener('click', () => {
        const id = btn.dataset.id;
        if (btn.dataset.act === 'plus')  qtys[id] = (qtys[id]||0) + 1;
        else qtys[id] = Math.max(0, (qtys[id]||0) - 1);
        render();
      });
    });
  }

  function commander() {
    // Mettre le panier à jour avec les qtys
    const cart = {};
    LAST_ORDER.forEach(i => { if (qtys[i.id] > 0) cart[i.id] = qtys[i.id]; });
    setCart(cart);
    window.location.href = 'upsell.html';
  }

  render();
</script>
</body>
</html>
